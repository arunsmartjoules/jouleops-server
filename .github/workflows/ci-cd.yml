name: Microservices CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job to detect which services have changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            rbac:
              - 'services/rbac/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            profiles:
              - 'services/profiles/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            utility:
              - 'services/utility/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            attendance:
              - 'services/attendance/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            sitelogs:
              - 'services/sitelogs/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            pm:
              - 'services/pm/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'
            tickets:
              - 'services/tickets/**'
              - 'shared/**'
              - 'package.json'
              - 'Dockerfile'

  # Build job for all changed services
  build:
    needs: changes
    if: needs.changes.outputs.services != '[]' && needs.changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Service Path
        id: path
        run: |
          if [ "${{ matrix.service }}" == "gateway" ]; then
            echo "path=gateway" >> $GITHUB_OUTPUT
          else
            echo "path=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVICE_NAME=${{ steps.path.outputs.path }}
          push: false # Set to true and add tags/auth for production
          tags: jouleops-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Test Job
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost
      JWT_SECRET: test-secret
      SUPABASE_URL: https://test.supabase.co
      INTERNAL_API_KEY: test-internal-key
      REDIS_URL: redis://localhost:6379
      PORT: 3420
      NODE_ENV: test
      RESEND_API_KEY: re_123456789
      WHAPI_TOKEN: wh_123456789
      SUPABASE_SERVICE_ROLE_KEY: sb_123456789
      SUPABASE_DB_PASSWORD: test-password
      JWT_EXPIRES_IN: 1d
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run Tests
        run: bunx turbo run test --continue

  # Deployment Job
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Docker
        run: |
          cd /home/ubuntu/backend
          git pull origin main
          echo "Starting sequential build..."
          docker compose build gateway
          docker compose build attendance
          docker compose build tickets
          docker compose build profiles
          docker compose build rbac
          docker compose build pm
          docker compose build sitelogs
          docker compose build utility
          echo "Restarting services..."
          docker compose up -d
