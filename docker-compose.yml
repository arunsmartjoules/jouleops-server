version: "3.8"

services:
  # Shared Redis for Caching and Auth
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    ports:
      - "3424:3424"
    environment:
      - PORT=3424
      - RBAC_SERVICE_URL=http://rbac:3425
      - PROFILES_SERVICE_URL=http://profiles:3426
      - SITES_SERVICE_URL=http://sites:3427
    depends_on:
      - rbac

  # RBAC Service
  rbac:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/rbac
    environment:
      - PORT=3425
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # Profiles Service
  profiles:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/profiles
    environment:
      - PORT=3426
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - rbac

  # Sites Service
  sites:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/sites
    environment:
      - PORT=3427
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - rbac
