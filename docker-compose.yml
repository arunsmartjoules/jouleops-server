services:
  # Shared Redis for Caching and Auth
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # API Gateway
  gateway:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    environment:
      - PORT=3420
      - MONOLITH_URL=http://host.docker.internal:3400
      - TICKETS_SERVICE_URL=http://tickets:3421
      - ATTENDANCE_SERVICE_URL=http://attendance:3422
      - SITELOGS_SERVICE_URL=http://sitelogs:3423
      - PM_SERVICE_URL=http://pm:3424
      - RBAC_SERVICE_URL=http://rbac:3425
      - UTILITY_SERVICE_URL=http://utility:3428
    depends_on:
      - rbac
      - tickets
      - attendance
      - sitelogs
      - pm
      - utility

  # Entry Point (Reverse Proxy)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # External port 3420 removed from Security Group; accessing via Caddy (80/443)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway

  # RBAC Service
  rbac:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/rbac
    environment:
      - PORT=3425
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # Utility Service (Email, WhatsApp, Notifications)
  utility:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/utility
    environment:
      - PORT=3428

  # Tickets Service
  tickets:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/tickets
    environment:
      - PORT=3421

  # Attendance Service
  attendance:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/attendance
    environment:
      - PORT=3422

  # SiteLogs Service
  sitelogs:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/sitelogs
    environment:
      - PORT=3423

  # PM Service
  pm:
    restart: unless-stopped
    env_file: .env.local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/pm
    environment:
      - PORT=3424

  # PowerSync Sync Engine (Self-Hosted)
  powersync:
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./powersync/config.yaml:/config/config.yaml:ro
      - ./powersync/sync-rules.yaml:/config/sync-rules.yaml:ro
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POWERSYNC_JWT_KEY_BASE64=${POWERSYNC_JWT_KEY_BASE64}
      - POWERSYNC_MONGO_URI=mongodb://mongo:27017/powersync
    depends_on:
      - mongo

  # MongoDB for PowerSync internal state
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - powersync_mongo:/data/db

  # Caddy (Automatic HTTPS)
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  caddy_data:
  caddy_config:
  powersync_mongo:
