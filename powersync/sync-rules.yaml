bucket_definitions:
  # Global reference data (synced to ALL authenticated users)
  global_reference:
    data:
      - SELECT id, category, description FROM complaint_category
      - SELECT id, task_name, log_name, sequence_number, log_id, dlr, dbr, nlt, nmt, created_at, updated_at FROM log_master
      - SELECT checklist_id AS id, title, asset_type, frequency, created_at FROM pm_checklist_master
      - SELECT id, checklist_id, task_name, field_type, sequence_no, image_mandatory, remarks_mandatory FROM pm_checklist
      - SELECT id, site_code, name AS site_name FROM sites

  # Per-user site assignments
  user_sites:
    parameters:
      - SELECT id AS bucket_id FROM site_user WHERE user_id = token_parameters.user_id
    data:
      - SELECT id, user_id, site_id FROM site_user WHERE id = bucket.bucket_id

  # Per-site data — use site_code as bucket parameter from site_user joined via sites
  # Parameters must be single table — we store site_code on site_user for this
  site_data:
    parameters:
      - SELECT site_code AS bucket_id FROM sites WHERE id IN (SELECT site_id FROM site_user WHERE user_id = token_parameters.user_id)
    data:
      - SELECT id, site_code, ticket_number, complaint AS title, description, status, priority, category, asset_name AS area, assigned_to, created_by, due_date, closed_at, created_at, updated_at FROM complaints WHERE site_code = bucket.bucket_id
      - SELECT id, site_code, executor_id, log_name, task_name, temperature, rh, tds, ph, hardness, chemical_dosing, remarks, entry_time, end_time, signature, assigned_to, attachment, status, created_at, updated_at FROM site_logs WHERE site_code = bucket.bucket_id
      - SELECT id, log_id, site_code, chiller_id, equipment_id, asset_name, asset_type, executor_id, date_shift, assigned_to, reading_time, start_datetime, end_datetime, condenser_inlet_temp, condenser_outlet_temp, evaporator_inlet_temp, evaporator_outlet_temp, compressor_suction_temp, motor_temperature, saturated_condenser_temp, saturated_suction_temp, set_point_celsius, discharge_pressure, main_suction_pressure, oil_pressure, oil_pressure_difference, condenser_inlet_pressure, condenser_outlet_pressure, evaporator_inlet_pressure, evaporator_outlet_pressure, compressor_load_percentage, inline_btu_meter, remarks, sla_status, reviewed_by, signature_text, attachments, status, created_at, updated_at FROM chiller_readings WHERE site_code = bucket.bucket_id
      - SELECT id, site_code, title, asset_id, asset_type, location, frequency, status, progress, assigned_to_name, start_due_date, maintenance_id, client_sign, before_image, after_image, created_at, updated_at FROM pm_instances WHERE site_code = bucket.bucket_id
      - SELECT id, site_code, asset_name, asset_type, location, description, created_at, updated_at FROM assets WHERE site_code = bucket.bucket_id
      - SELECT id, user_id, site_code, date, check_in_time, check_out_time, check_in_latitude, check_in_longitude, check_out_latitude, check_out_longitude, check_in_address, check_out_address, shift_id, status, remarks, created_at, updated_at FROM attendance_logs WHERE site_code = bucket.bucket_id

  # PM responses
  pm_responses:
    parameters:
      - SELECT id AS bucket_id FROM pm_instances WHERE site_code IN (SELECT site_code FROM sites WHERE id IN (SELECT site_id FROM site_user WHERE user_id = token_parameters.user_id))
    data:
      - SELECT id, instance_id, checklist_item_id, response_value, readings, remarks, image_url, created_at, updated_at FROM pm_response WHERE instance_id = bucket.bucket_id
