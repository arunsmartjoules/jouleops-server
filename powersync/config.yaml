# PowerSync Self-Hosted Configuration
# Docs: https://docs.powersync.com/self-hosting/configuration

replication:
  connections:
    - type: postgresql
      uri: !env PS_DATABASE_URL
      slot_name: powersync_slot
      publication: powersync_pub

client_auth:
  jwks:
    keys:
      - kty: oct
        alg: HS256
        k: !env PS_JWT_KEY_BASE64

storage:
  type: mongodb
  uri: !env PS_MONGO_URI

api:
  port: 8080

sync_rules:
  path: /app/sync-rules.yaml

telemetry:
  disable_telemetry: true
